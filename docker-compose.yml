version: "3.8"

services:
  app:
    build: .
    container_name: bank_app
    restart: always
    ports:
      - "80:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: bank_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bank_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./php_app.sql:/docker-entrypoint-initdb.d/php_app.sql

volumes:
  mysql_data:
