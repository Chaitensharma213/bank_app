version: "1.0"

services:
  mysql:
    image: mysql:8.0
    container_name: bank_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_app

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bank_app

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "80:80"

    volumes:
      - .:/var/www/html

volumes:
  mysql_data:
